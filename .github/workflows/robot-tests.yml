name: Robot Framework CI

on:
  workflow_dispatch:
    inputs:
      browser:
        description: Browser to run tests on
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
          - webkit
      environment:
        description: Target environment
        required: true
        default: PROD
        type: choice
        options:
          - DEV
          - HML
          - PROD
      tag:
        description: Robot tag to include (optional)
        required: false
        default: ""
        type: string
      test_file:
        description: Robot test file path
        required: true
        default: tests/test_dino_authentication.robot
        type: string
      test_case:
        description: Robot test case name/pattern (optional)
        required: false
        default: ""
        type: string
      debug_mode:
        description: Enable debug mode (TRACE logs)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build-ci-image:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          echo "tag=ghcr.io/${{ github.repository_owner }}/robot-web-ci:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          tags: |
            ${{ steps.image.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/robot-web-ci:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  robot-tests:
    needs: build-ci-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.build-ci-image.outputs.image_tag }}
      
    env:
      BROWSER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.browser || 'chromium' }}
      HEADLESS: "True"
      ENVIRONMENT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'PROD' }}
      DEBUG_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug_mode || 'false' }}

    steps:

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::219850556934:role/github.to.aws.oicd
          aws-region: us-east-1
        
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Robot tests
        run: |
          ROBOT_ARGS=("-d" "output")

          if [ "$DEBUG_MODE" = "true" ]; then
            ROBOT_ARGS+=("-L" "TRACE" "--console" "verbose")
          fi

          if [ -n "${{ github.event.inputs.tag }}" ]; then
            ROBOT_ARGS+=("--include" "${{ github.event.inputs.tag }}")
          fi

          if [ -n "${{ github.event.inputs.test_case }}" ]; then
            ROBOT_ARGS+=("--test" "${{ github.event.inputs.test_case }}")
          fi

          TEST_FILE="${{ github.event.inputs.test_file }}"
          if [ -z "$TEST_FILE" ]; then
            TEST_FILE="tests/test_dino_authentication.robot"
          fi

          ROBOT_ARGS+=("$TEST_FILE")

          robot "${ROBOT_ARGS[@]}"

      - name: Upload Robot Framework report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-output
          path: output/
